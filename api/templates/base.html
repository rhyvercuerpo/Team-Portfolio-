<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Team Projects{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <nav class="bg-white shadow-md p-4 flex justify-between items-center">
    <a href="{% url 'home' %}" class="text-xl font-bold text-indigo-600">TeamPortfolio</a>
    <a href="{% url 'projects' %}" class="text-gray-700 hover:text-indigo-600">Back to Projects</a>
  </nav>

  <main class="p-6">
    {% block content %}
    {% endblock %}
  </main>

  <footer class="text-center py-4 mt-10 border-t text-sm text-gray-500">
    © {{ now|date:"Y" }} EliteDev — All Rights Reserved
  </footer>
</body>
</html>

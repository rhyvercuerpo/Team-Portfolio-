<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title> Anti-Sexual Harassment Act & RA 11313 and Safe Spaces Act </title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fdf6f9;
      color: #333;
      padding: 20px;
      margin: 0;
    }
    header {
      text-align: center;
      padding: 40px 20px 20px;
      background: #ffe3ec;
      border-bottom: 5px solid #f48fb1;
    }
    header h1 {
      font-size: 2em;
      color: #ad1457;
      margin: 0;
    }
    .quiz-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 25px;
      background: #fff0f5;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    .question {
      margin-bottom: 30px;
    }
    .question h3 {
      color: #6a1b9a;
      margin-bottom: 10px;  
      font-weight: 600;
    }
    .options label {
      display: block;
      margin: 10px 0;
      padding: 10px 15px;
      background: #fce4ec;
      border-radius: 10px;
      border: 1px solid #f8bbd0;
      transition: 0.3s;
      cursor: pointer;
    }
    .options label:hover {
      background-color: #f8bbd0;
    }
    .options input[type="radio"] {
      margin-right: 10px;
    }
    #submitBtn {
      background-color: #f06292;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 1em;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      display: block;
      margin: 30px auto 10px;
    }
    #submitBtn:hover {
      background-color: #ec407a;
    }
     a {
    text-align: center;
    display: block;
    color: #7b1fa2;
    text-decoration: none;
    margin-top: 15px;
  }

    .feedback {
      font-weight: bold;
      margin-top: 8px;
      padding-left: 5px;
    }
    .correct {
      color: #388e3c;
    }
    .incorrect {
      color: #d32f2f;
    }
    #result {
      text-align: center;
      font-size: 1.4em;
      margin-top: 30px;
      padding: 10px;
      background-color: #f3e5f5;
      border-radius: 12px;
      color: #4a148c;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>Anti-Sexual Harassment Act & RA 11313 and Safe Spaces Act </h1>
  </header>

  <div class="quiz-container">
    <form id="quizForm">
     
<script>
  const questions = [
    ["RA 7877 is also known as:", 
     "Women Empowerment Law", 
     "Anti-Sexual Harassment Act of 1995", 
     "Anti-Bullying Act", 
     "Workplace Ethics Act", 
     "b"],

    ["What is the main objective of RA 7877?", 
     "Promote online safety", 
     "Penalize acts of sexual harassment in work and education settings", 
     "Stop gambling", 
     "Promote gender-exclusive spaces", 
     "b"],

    ["Who can be held liable under RA 7877?", 
     "Students only", 
     "Minors", 
     "Persons in authority, influence, or moral ascendancy", 
     "Tourists", 
     "c"],

    ["RA 7877 applies primarily to which settings?", 
     "Homes", 
     "Workplaces and educational institutions", 
     "Shopping centers", 
     "Hospitals", 
     "b"],

    ["RA 11313 is also known as:", 
     "Gender Equity Law", 
     "Urban Behavior Act", 
     "Safe Spaces Act or “Bawal Bastos Law”", 
     "Traffic Safety Act", 
     "c"],

    ["What is the key focus of RA 11313?", 
     "Housing", 
     "Addressing gender-based sexual harassment in public spaces", 
     "Employment", 
     "Transportation costs", 
     "b"],

    ["Catcalling and wolf-whistling are punishable under:", 
     "RA 9262", 
     "RA 11313 (Safe Spaces Act)", 
     "RA 1425", 
     "RA 8792", 
     "b"],

    ["Under RA 11313, who can be a perpetrator?", 
     "Only men in power", 
     "Any person, regardless of position", 
     "Only foreigners", 
     "Only teachers", 
     "b"],

    ["Posting lewd photos of someone online without consent is:", 
     "Educational", 
     "Online sexual harassment", 
     "Legal if anonymous", 
     "Artistic freedom", 
     "b"],

    ["What agency implements RA 11313?", 
     "DepEd", 
     "Philippine Commission on Women (PCW) and DILG", 
     "LTO", 
     "NBI", 
     "b"],

    ["Which of the following is not sexual harassment?", 
     "Repeated sexual jokes at work", 
     "Threatening someone for sex", 
     "Respectful compliment with no pressure", 
     "Demanding sexual favors for grades", 
     "c"],

    ["Staring in a lascivious manner falls under:", 
     "Cultural tradition", 
     "Gender-based street harassment", 
     "Academic discussion", 
     "Public speaking", 
     "b"],

    ["Which of the following is a punishment under RA 11313?", 
     "Scholarship", 
     "Fine, community service, or imprisonment", 
     "Traffic citation", 
     "Free seminar", 
     "b"],

    ["What is “gender-based online sexual harassment”?", 
     "Posting selfies", 
     "Sending unwanted sexual content via social media", 
     "Watching news", 
     "Virtual meetings", 
     "b"],

    ["What role do schools have under RA 7877?", 
     "Promote silence", 
     "Create a committee to handle harassment complaints", 
     "Ban relationships", 
     "Punish gossip", 
     "b"],

    ["When is an act considered sexual harassment?", 
     "When it involves strangers", 
     "When it causes discomfort or fear due to unwanted sexual behavior", 
     "When it is between friends", 
     "Only in private places", 
     "b"],

    ["What can victims of harassment in public spaces do?", 
     "Ignore it", 
     "Report to authorities or use legal channels under RA 11313", 
     "Blame themselves", 
     "Keep quiet", 
     "b"],

    ["Under RA 11313, who is protected?", 
     "Only minors", 
     "All persons, regardless of gender or age", 
     "Only women", 
     "Only employees", 
     "b"],

    ["Employers must do what under RA 7877?", 
     "Ignore cases", 
     "Keep silent", 
     "Prevent and act on sexual harassment incidents", 
     "Promote office dating", 
     "c"],

    ["One goal of both laws is to:", 
     "Protect perpetrators", 
     "Ensure safety and dignity in all spaces", 
     "Increase silence", 
     "Encourage confrontation", 
     "b"]
  ];

  let html = '';
  questions.forEach((q, i) => {
    const qNum = i + 1;
    const [question, a, b, c, d, answer] = q;
    html += `
      <div class="question" data-answer="${answer}">
        <h3>${qNum}. ${question}</h3>
        <div class="options">
          <label><input type="radio" name="q${qNum}" value="a"> ${a}</label>
          <label><input type="radio" name="q${qNum}" value="b"> ${b}</label>
          <label><input type="radio" name="q${qNum}" value="c"> ${c}</label>
          <label><input type="radio" name="q${qNum}" value="d"> ${d}</label>
        </div>
        <div class="feedback" id="feedback${qNum}"></div>
      </div>
    `;
  });

  document.write(html);
</script>

      <button type="button" id="submitBtn" onclick="submitQuiz()">Submit</button>
      <a href="QuizzesPage.html">← Back to Quizzes</a>
      <div id="result"></div>
    </form>
  </div>

  <script>
    function submitQuiz() {
      let score = 0;
      const totalQuestions = 20;

      for (let i = 1; i <= totalQuestions; i++) {
        const question = document.querySelector(`.question:nth-of-type(${i})`);
        const correctAnswer = question.getAttribute('data-answer');
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const feedback = document.getElementById(`feedback${i}`);

        if (selected) {
          if (selected.value === correctAnswer) {
            feedback.textContent = "Correct!";
            feedback.className = "feedback correct";
            score++;
          } else {
            feedback.textContent = "Incorrect.";
            feedback.className = "feedback incorrect";
          }
        } else {
          feedback.textContent = "No answer selected.";
          feedback.className = "feedback incorrect";
        }
      }

      document.getElementById('result').textContent = `You scored ${score} out of ${totalQuestions}`;
    }
  </script>

</body>
</html>

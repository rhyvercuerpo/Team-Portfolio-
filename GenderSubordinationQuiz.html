<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gender Subordination Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fdf6f9;
      color: #333;
      padding: 20px;
      margin: 0;
    }
    header {
      text-align: center;
      padding: 40px 20px 20px;
      background: #ffe3ec;
      border-bottom: 5px solid #f48fb1;
    }
    header h1 {
      font-size: 2em;
      color: #ad1457;
      margin: 0;
    }
    .quiz-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 25px;
      background: #fff0f5;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    .question {
      margin-bottom: 30px;
    }
    .question h3 {
      color: #6a1b9a;
      margin-bottom: 10px;  
      font-weight: 600;
    }
    .options label {
      display: block;
      margin: 10px 0;
      padding: 10px 15px;
      background: #fce4ec;
      border-radius: 10px;
      border: 1px solid #f8bbd0;
      transition: 0.3s;
      cursor: pointer;
    }
    .options label:hover {
      background-color: #f8bbd0;
    }
    .options input[type="radio"] {
      margin-right: 10px;
    }
    #submitBtn {
      background-color: #f06292;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 1em;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      display: block;
      margin: 30px auto 10px;
    }
    #submitBtn:hover {
      background-color: #ec407a;
    }
     a {
    text-align: center;
    display: block;
    color: #7b1fa2;
    text-decoration: none;
    margin-top: 15px;
  }

    .feedback {
      font-weight: bold;
      margin-top: 8px;
      padding-left: 5px;
    }
    .correct {
      color: #388e3c;
    }
    .incorrect {
      color: #d32f2f;
    }
    #result {
      text-align: center;
      font-size: 1.4em;
      margin-top: 30px;
      padding: 10px;
      background-color: #f3e5f5;
      border-radius: 12px;
      color: #4a148c;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>Gender Subordination Quiz</h1>
  </header>

  <div class="quiz-container">
    <form id="quizForm">
     
      <script>
        const questions = [
          ["Which of the following best defines gender subordination?", "Equal access to opportunities", "Treating one gender as inferior to another", "Promoting women's empowerment", "Denial of biological differences", "b"],
          ["A patriarchal society is an example of:", "Gender equality", "Gender neutrality", "Gender subordination", "Feminism", "c"],
          ["Which term refers to the control men often have in political and economic institutions?", "Matriarchy", "Sexism", "Patriarchy", "Egalitarianism", "c"],
          ["Which of the following reinforces gender subordination in mass media?", "Equal portrayal of all genders", "Stereotypical roles of women", "Balanced representation", "Objective reporting", "b"],
          ["Gender subordination is most directly challenged by:", "Traditional customs", "Patriarchal laws", "Feminist movements", "Biological differences", "c"],
          ["What is one impact of gender subordination in workplaces?", "Equal pay", "Promotion bias", "Inclusive hiring", "Merit-based rewards", "b"],
          ["Cultural beliefs that men are stronger leaders reinforce:", "Gender equality", "Gender stereotypes", "Equal opportunity", "Feminism", "b"],
          ["Which institution can perpetuate gender subordination through hidden curriculum?", "Family", "Government", "Education", "Religion", "c"],
          ["\"The private sphere is for women, the public for men\" is a belief rooted in:", "Equality", "Subversion", "Gender subordination", "Freedom", "c"],
          ["Women being unpaid for domestic labor is an example of:", "Voluntary work", "Gender neutrality", "Economic subordination", "Capitalism", "c"],
          ["Which philosophy actively critiques systems that cause gender subordination?", "Realism", "Feminism", "Libertarianism", "Stoicism", "b"],
          ["In some societies, women are discouraged from owning land. This is a form of:", "Gender empowerment", "Economic subordination", "Legal equality", "Cultural innovation", "b"],
          ["What role do gender norms play in subordination?", "They promote fairness", "They assign rigid expectations", "They prevent inequality", "They support neutrality", "b"],
          ["Which social system typically favors male leadership and dominance?", "Socialism", "Feminism", "Patriarchy", "Pluralism", "c"],
          ["How can religion sometimes contribute to gender subordination?", "Promoting equality", "Encouraging female leadership", "Justifying male dominance", "Condemning violence", "c"],
          ["An example of institutionalized gender subordination is:", "Equal parental leave", "Laws against harassment", "Discriminatory hiring policies", "Free education", "c"],
          ["The belief that men should be breadwinners is a:", "Biological fact", "Cultural stereotype", "Universal truth", "Modern principle", "b"],
          ["Which of the following is a key strategy in addressing gender subordination?", "Suppressing protest", "Limiting education", "Gender mainstreaming", "Promoting tradition", "c"],
          ["What type of power imbalance is typical in gender subordination?", "Informal authority", "Equal decision-making", "Male dominance", "Female leadership", "c"],
          ["Challenging gender subordination requires:", "Maintaining traditions", "Promoting stereotypes", "Critical social analysis", "Ignoring inequality", "c"]
        ];

        let html = '';
        questions.forEach((q, i) => {
          const qNum = i + 1;
          const [question, a, b, c, d, answer] = q;
          html += `
          <div class="question" data-answer="${answer}">
            <h3>${qNum}. ${question}</h3>
            <div class="options">
              <label><input type="radio" name="q${qNum}" value="a"> ${a}</label>
              <label><input type="radio" name="q${qNum}" value="b"> ${b}</label>
              <label><input type="radio" name="q${qNum}" value="c"> ${c}</label>
              <label><input type="radio" name="q${qNum}" value="d"> ${d}</label>
            </div>
            <div class="feedback" id="feedback${qNum}"></div>
          </div>
          `;
        });

        document.write(html);
      </script>

      <button type="button" id="submitBtn" onclick="submitQuiz()">Submit</button>
      <a href="QuizzesPage.html">← Back to Quizzes</a>
      <div id="result"></div>
    </form>
  </div>

  <script>
    function submitQuiz() {
      let score = 0;
      const totalQuestions = 20;

      for (let i = 1; i <= totalQuestions; i++) {
        const question = document.querySelector(`.question:nth-of-type(${i})`);
        const correctAnswer = question.getAttribute('data-answer');
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const feedback = document.getElementById(`feedback${i}`);

        if (selected) {
          if (selected.value === correctAnswer) {
            feedback.textContent = "Correct!";
            feedback.className = "feedback correct";
            score++;
          } else {
            feedback.textContent = "Incorrect.";
            feedback.className = "feedback incorrect";
          }
        } else {
          feedback.textContent = "No answer selected.";
          feedback.className = "feedback incorrect";
        }
      }

      document.getElementById('result').textContent = `You scored ${score} out of ${totalQuestions}`;
    }
  </script>

</body>
</html>

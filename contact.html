<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Contact Us - Voices for Gender Equality and Diversity</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f6f6;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #6a1b9a;
            color: white;
            padding: 20px;
            text-align: center;
        }      
    .container {
      max-width: 800px;
      margin: 30px auto;
      background: rgba(107, 33, 168, 0.08); /* soft purple tint */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      text-align: center;
    }
        h2 {
            color: #6a1b9a;
        }

        .image-section img {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }

        .image-section img:hover {
            transform: scale(1.05);
        }

        .image-description {
            font-style: italic;
            color: #555;
            margin-top: 10px;
        }

        .contact-details {
            margin-top: 30px;
            font-size: 18px;
            color: #333;
        }

        .contact-details p {
            margin: 10px 0;
        }

        .contact-details a {
            color: #6a1b9a;
            text-decoration: none;
        }

        .contact-details a:hover {
            text-decoration: underline;
        }

        /* .team-cards {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
        } */

        .card {
            width: 180px;
            height: 240px;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .card:hover img {
            transform: scale(1.1);
        }

        .team-carousel {
            position: relative;
            width: 320px;
            margin: 30px auto 0 auto;
            height: 270px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-track {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 240px;
            height: 100%;
            position: relative;
        }

        .carousel-card {
            width: 180px;
            height: 240px;
            overflow: hidden;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, opacity 0.3s;
            position: absolute;
            left: 50%;
            top: 0;
            transform: translateX(-50%) scale(1);
            opacity: 0;
            z-index: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .carousel-card.active {
            opacity: 1;
            z-index: 2;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }

        .carousel-card.prev,
        .carousel-card.next {
            opacity: 0.5;
            z-index: 1;
            pointer-events: none;
            transform: translateX(-140%) scale(0.9);
        }

        .carousel-card.next {
            transform: translateX(40%) scale(0.9);
        }

        .carousel-card img {
            width: 160px;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .member-name {
            margin-top: 10px;
            font-weight: bold;
            color: #161516;
            background: #f6f6f6;
            border-radius: 8px;
            padding: 4px 12px;
            font-size: 16px;
        }

        .carousel-arrow {
            font-size: 2rem;
            color: #0f0f0f;
            cursor: pointer;
            user-select: none;
            padding: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            transition: background 0.2s;
            z-index: 10;
        }

        .carousel-arrow:hover {
            background: #e1bee7;
        }

        .left-arrow {
            margin-right: 10px;
        }

        .right-arrow {
            margin-left: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>About Us</h1>
        <p>We’re here to connect with you!</p>
    </header>

    <div class="container">
        <center>
           <div class="card">
  <img src="SirRevRev.jpg" alt="Team Member 5">
  
</div>
<div class="label" style="font-weight: bold; font-size: 18px; color: #333; text-align: center; padding: 10px 5px;">
  Revrev A. Tio
</div>
<div class="label">Instructor</div>


        </center>
        <div style="display: flex; justify-content: center; align-items: center; margin-top: 30px;">
            <div class="carousel-arrow left-arrow">&#8592;</div>
            <div class="team-carousel">
                <div class="carousel-track">
                    <div class="carousel-card prev">
                        <img src="photo4.jpg" alt="Team Member 4">
                        <div class="member-name">Team Member 4</div>
                    </div>
                    <div class="carousel-card active">
                        <img src="photo1.jpg" alt="Team Member 1">
                        <div class="member-name">Team Member 1</div>
                    </div>
                    <div class="carousel-card next">
                        <img src="photo2.jpg" alt="Team Member 2">
                        <div class="member-name">Team Member 2</div>
                    </div>
                </div>
            </div>
            <div class="carousel-arrow right-arrow">&#8594;</div>
        </div>
        <script>
            const members = [
                { img: "joshuaa.jpg", name: "Joshua Rey G. Maquiso" },
                { img: "quiber.jpg", name: "Nathaniel Quille C. Quiber" },
                { img: "jerald.jpg", name: "Jerald C. Boleche" },
                { img: "jorda.jpg", name: "Christian Dominique L. Jorda" },
                { img: "baboy.jpg", name: "John Michael T. Ramos" },
                { img: "maye.jpg", name: "Mariel I. Derla" },
                { img: "janrey.jpg", name: "Jhon Rey R. Bagsain" },
                { img: "Gilbert.gif", name: "Gilberth A. Paluga" },
                { img: "Quen.jpg", name: "Queenie Jill D. Sumalinog" },
                { img: "Rhyver.PNG", name: "Rhyver John M. Cuerpo" },
                { img: "Adrian.jpg", name: "Adrian Peroso" },
                { img: "Jadee.jpg", name: "Jade Aries Gonzales" },
                { img: "Daniel.jpg", name: "Daniel O. Realiza" }
            ];

            let current = 0;

            function updateCarousel() {
                const track = document.querySelector('.carousel-track');
                track.innerHTML = '';

                // Previous card
                const prevIdx = (current - 1 + members.length) % members.length;
                const prevCard = document.createElement('div');
                prevCard.className = 'carousel-card prev';
                prevCard.innerHTML = `<img src="${members[prevIdx].img}" alt="${members[prevIdx].name}">
                <div class="member-name">${members[prevIdx].name}</div>`;
                track.appendChild(prevCard);

                // Active card
                const activeCard = document.createElement('div');
                activeCard.className = 'carousel-card active';
                activeCard.innerHTML = `<img src="${members[current].img}" alt="${members[current].name}">
                <div class="member-name">${members[current].name}</div>`;
                track.appendChild(activeCard);

                // Next card
                const nextIdx = (current + 1) % members.length;
                const nextCard = document.createElement('div');
                nextCard.className = 'carousel-card next';
                nextCard.innerHTML = `<img src="${members[nextIdx].img}" alt="${members[nextIdx].name}">
                <div class="member-name">${members[nextIdx].name}</div>`;
                track.appendChild(nextCard);
            }

            document.querySelector('.left-arrow').onclick = function () {
                current = (current - 1 + members.length) % members.length;
                updateCarousel();
            };
            document.querySelector('.right-arrow').onclick = function () {
                current = (current + 1) % members.length;
                updateCarousel();
            };

            updateCarousel();
        </script>
<div class="mt-12 text-center">
  <a href="website2.html" class="text-blue-600 hover:underline">
    ← Back to Home
  </a>
</div>
    </div>

</body>

</html>

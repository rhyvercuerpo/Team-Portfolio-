<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Women and Public Life</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fdf6f9;
      color: #333;
      padding: 20px;
      margin: 0;
    }
    header {
      text-align: center;
      padding: 40px 20px 20px;
      background: #ffe3ec;
      border-bottom: 5px solid #f48fb1;
    }
    header h1 {
      font-size: 2em;
      color: #ad1457;
      margin: 0;
    }
    .quiz-container {
      max-width: 800px;
      margin: 40px auto;
      padding: 25px;
      background: #fff0f5;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }
    .question {
      margin-bottom: 30px;
    }
    .question h3 {
      color: #6a1b9a;
      margin-bottom: 10px;  
      font-weight: 600;
    }
    .options label {
      display: block;
      margin: 10px 0;
      padding: 10px 15px;
      background: #fce4ec;
      border-radius: 10px;
      border: 1px solid #f8bbd0;
      transition: 0.3s;
      cursor: pointer;
    }
    .options label:hover {
      background-color: #f8bbd0;
    }
    .options input[type="radio"] {
      margin-right: 10px;
    }
    #submitBtn {
      background-color: #f06292;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 1em;
      font-weight: 600;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      display: block;
      margin: 30px auto 10px;
    }
    #submitBtn:hover {
      background-color: #ec407a;
    }
     a {
    text-align: center;
    display: block;
    color: #7b1fa2;
    text-decoration: none;
    margin-top: 15px;
  }

    .feedback {
      font-weight: bold;
      margin-top: 8px;
      padding-left: 5px;
    }
    .correct {
      color: #388e3c;
    }
    .incorrect {
      color: #d32f2f;
    }
    #result {
      text-align: center;
      font-size: 1.4em;
      margin-top: 30px;
      padding: 10px;
      background-color: #f3e5f5;
      border-radius: 12px;
      color: #4a148c;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>Women and Public Life</h1>
  </header>

  <div class="quiz-container">
    <form id="quizForm">
     
<script>
  const questions = [
    ["What does women’s participation in public life generally refer to?", "Home-based work", "Shopping habits", "Engagement in political, civic, and social affairs", "Private decision-making", "c"],
    ["Which of the following is a barrier to women's political participation?", "Political parties encouraging female candidates", "Gender stereotypes and biases", "Quota systems", "Government subsidies", "b"],
    ["Which Philippine law mandates 40% female representation in development councils?", "Magna Carta of Women", "Anti-Violence Against Women Act", "Labor Code", "Cybercrime Prevention Act", "a"],
    ["Which of the following is an example of women in public life?", "A housewife cooking for her family", "A female barangay captain holding a meeting", "A girl attending school", "A woman shopping in a market", "b"],
    ["What is the significance of women leaders in governance?", "They enforce family rules", "They represent elite interests", "They offer diverse perspectives in decision-making", "They promote male-dominated policies", "c"],
    ["Gender quotas in public office are intended to:", "Eliminate elections", "Ensure male leadership", "Encourage equal representation", "Reduce women’s participation", "c"],
    ["In the Philippines, women have had the right to vote since:", "1945", "1937", "1965", "1986", "b"],
    ["What is a challenge for women leaders?", "Too many role models", "Excessive public support", "Gendered expectations and criticism", "High campaign budgets", "c"],
    ["Which international document promotes women’s rights in political life?", "Kyoto Protocol", "CEDAW", "NAFTA", "UNCLOS", "b"],
    ["Women in public life help promote:", "Patriarchy", "Political apathy", "Gender equality and inclusive governance", "Private business interests", "c"],
    ["What does the term “tokenism” mean in public office?", "Full equality", "Merit-based appointments", "Symbolic inclusion without real power", "Overrepresentation of women", "c"],
    ["A woman organizing a voter education seminar is participating in:", "Domestic work", "Civic engagement", "Online shopping", "Religious ritual", "b"],
    ["Which of the following countries had a female head of state before the Philippines?", "India", "Canada", "USA", "Japan", "a"],
    ["Women's inclusion in peace processes increases the likelihood of:", "Prolonged conflict", "Rejection of treaties", "Long-term peace", "Military rule", "c"],
    ["What is the term for government services equally benefiting men and women?", "Gender-neutral policy", "Gender-biased law", "Gender-responsive governance", "Patriarchal system", "c"],
    ["Which of these roles is most associated with women's civic participation?", "CEO of a private firm", "Barangay health worker organizing community drives", "Stay-at-home parent", "Actress in media", "b"],
    ["What is a common stereotype against women in politics?", "They are more corrupt", "They are more violent", "They are too emotional to lead", "They are more logical", "c"],
    ["Women’s involvement in grassroots movements often leads to:", "Political apathy", "Stronger community development", "Lower education rates", "Gender inequality", "b"],
    ["Women’s political empowerment helps address issues like:", "Industrial decline", "Climate change", "Gender-based violence", "Inflation", "c"],
    ["What is the goal of inclusive public policy?", "Favor elite men", "Support majority rule only", "Represent all sectors, including women", "Centralize power", "c"]
  ];

  let html = '';
  questions.forEach((q, i) => {
    const qNum = i + 1;
    const [question, a, b, c, d, answer] = q;
    html += `
      <div class="question" data-answer="${answer}">
        <h3>${qNum}. ${question}</h3>
        <div class="options">
          <label><input type="radio" name="q${qNum}" value="a"> ${a}</label>
          <label><input type="radio" name="q${qNum}" value="b"> ${b}</label>
          <label><input type="radio" name="q${qNum}" value="c"> ${c}</label>
          <label><input type="radio" name="q${qNum}" value="d"> ${d}</label>
        </div>
        <div class="feedback" id="feedback${qNum}"></div>
      </div>
    `;
  });

  document.write(html);
</script>

      <button type="button" id="submitBtn" onclick="submitQuiz()">Submit</button>
      <a href="QuizzesPage.html">← Back to Home page</a>
      <div id="result"></div>
    </form>
  </div>

  <script>
    function submitQuiz() {
      let score = 0;
      const totalQuestions = 20;

      for (let i = 1; i <= totalQuestions; i++) {
        const question = document.querySelector(`.question:nth-of-type(${i})`);
        const correctAnswer = question.getAttribute('data-answer');
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const feedback = document.getElementById(`feedback${i}`);

        if (selected) {
          if (selected.value === correctAnswer) {
            feedback.textContent = "Correct!";
            feedback.className = "feedback correct";
            score++;
          } else {
            feedback.textContent = "Incorrect.";
            feedback.className = "feedback incorrect";
          }
        } else {
          feedback.textContent = "No answer selected.";
          feedback.className = "feedback incorrect";
        }
      }

      document.getElementById('result').textContent = `You scored ${score} out of ${totalQuestions}`;
    }
  </script>

</body>
</html>
